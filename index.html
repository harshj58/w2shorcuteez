<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete HTML Academy</title>
    <style>
        :root { --w3-green: #04AA6D; --w3-dark: #282a35; --w3-light: #f1f1f1; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        header { background: white; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--w3-green); font-size: 24px; font-weight: 900; text-decoration: none; flex-grow: 1; }

        .container { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 220px; background: var(--w3-light); overflow-y: auto; border-right: 1px solid #ddd; }
        .sidebar h4 { padding: 15px 15px 5px; margin: 0; color: #555; font-size: 13px; text-transform: uppercase; }
        .sidebar a { display: block; padding: 8px 15px; color: black; text-decoration: none; font-size: 14px; cursor: pointer; }
        .sidebar a:hover { background-color: #ddd; }
        .sidebar a.active { background: var(--w3-green); color: white; }

        main { flex: 1; overflow-y: auto; padding: 30px; }
        .example-box { background: #E7E9EB; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 5px solid var(--w3-green); }
        
        .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        textarea { width: 100%; height: 300px; font-family: 'Consolas', monospace; padding: 10px; border: 1px solid #ccc; font-size: 14px; }
        iframe { width: 100%; height: 300px; background: white; border: 1px solid #ccc; }
        
        .run-btn { background: var(--w3-green); color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .run-btn:hover { background: #059862; }

        @media (max-width: 800px) { .sidebar { display: none; } .editor-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">HTML MASTER</a>
    <div style="font-size: 12px; color: #777;">Vercel Hobby Edition</div>
</header>

<div class="container">
    <aside class="sidebar">
        <h4>HTML Tutorial</h4>
        <a onclick="loadTopic('home')" id="link-home" class="active">HTML Home</a>
        <a onclick="loadTopic('intro')" id="link-intro">HTML Intro</a>
        <a onclick="loadTopic('elements')" id="link-elements">HTML Elements</a>
        <a onclick="loadTopic('attributes')" id="link-attributes">HTML Attributes</a>
        <a onclick="loadTopic('headings')" id="link-headings">HTML Headings</a>
        <a onclick="loadTopic('paragraphs')" id="link-paragraphs">HTML Paragraphs</a>
        <a onclick="loadTopic('styles')" id="link-styles">HTML Styles</a>
        <a onclick="loadTopic('formatting')" id="link-formatting">HTML Formatting</a>
        <a onclick="loadTopic('links')" id="link-links">HTML Links</a>
        <a onclick="loadTopic('images')" id="link-images">HTML Images</a>
        <a onclick="loadTopic('tables')" id="link-tables">HTML Tables</a>
        <a onclick="loadTopic('lists')" id="link-lists">HTML Lists</a>
        <a onclick="loadTopic('forms')" id="link-forms">HTML Forms</a>
    </aside>

    <main>
        <h1 id="title">HTML Home</h1>
        <p id="desc">HTML is the standard markup language for Web pages.</p>
        
        <div class="example-box">
            <h3>Try it Yourself</h3>
            <button class="run-btn" onclick="runCode()">Run Code ❯</button>
            <div class="editor-grid">
                <textarea id="code-input"></textarea>
                <iframe id="result-frame"></iframe>
            </div>
        </div>
    </main>
</div>

<script>
    const topics = {
        home: {
            title: "HTML Home",
            desc: "With HTML you can create your own Website.",
            code: "<html>\n<body>\n<h1>My First Heading</h1>\n<p>My first paragraph.</p>\n</body>\n</html>"
        },
        intro: {
            title: "HTML Introduction",
            desc: "HTML stands for Hyper Text Markup Language.",
            code: "<html>\n<body>\n<p>HTML is the standard markup language for creating Web pages.</p>\n</body>\n</html>"
        },
        elements: {
            title: "HTML Elements",
            desc: "An HTML element is defined by a start tag, some content, and an end tag.",
            code: "<h1>My Heading</h1>\n<p>My paragraph.</p>\n<br>\n<p>The br tag is an empty element.</p>"
        },
        attributes: {
            title: "HTML Attributes",
            desc: "Attributes provide additional information about elements.",
            code: "<a href='https://vercel.com'>Visit Vercel</a>\n<img src='https://via.placeholder.com/100' width='100' height='100'>"
        },
        headings: {
            title: "HTML Headings",
            desc: "HTML headings are defined with the h1 to h6 tags.",
            code: "<h1>Heading 1</h1>\n<h2>Heading 2</h2>\n<h3>Heading 3</h3>\n<h4>Heading 4</h4>"
        },
        paragraphs: {
            title: "HTML Paragraphs",
            desc: "The HTML p element defines a paragraph.",
            code: "<p>This is a paragraph.</p>\n<p>This is another paragraph.</p>"
        },
        styles: {
            title: "HTML Styles",
            desc: "The HTML style attribute is used to add styles to an element.",
            code: "<p style='color:red;'>I am red</p>\n<p style='color:blue; font-size:30px;'>I am blue and big</p>"
        },
        formatting: {
            title: "HTML Formatting",
            desc: "HTML contains several elements for defining text with a special meaning.",
            code: "<b>This text is bold</b><br>\n<i>This text is italic</i><br>\n<strong>This is important</strong>"
        },
        links: {
            title: "HTML Links",
            desc: "HTML links are hyperlinks. You can click on a link and jump to another document.",
            code: "<a href='https://www.google.com' target='_blank'>Click to Open Google</a>"
        },
        images: {
            title: "HTML Images",
            desc: "Images can improve the design and the appearance of a web page.",
            code: "<img src='https://via.placeholder.com/200x100' alt='Example Image' style='border:2px solid green;'>"
        },
        tables: {
            title: "HTML Tables",
            desc: "HTML tables allow web developers to arrange data into rows and columns.",
            code: "<table border='1'>\n <tr>\n  <th>Month</th>\n  <th>Savings</th>\n </tr>\n <tr>\n  <td>January</td>\n  <td>$100</td>\n </tr>\n</table>"
        },
        lists: {
            title: "HTML Lists",
            desc: "HTML lists allow web developers to group a set of related items in lists.",
            code: "<ul>\n <li>Coffee</li>\n <li>Tea</li>\n</ul>\n<ol>\n <li>First</li>\n <li>Second</li>\n</ol>"
        },
        forms: {
            title: "HTML Forms",
            desc: "The HTML form element is used to collect user input.",
            code: "<form>\n <label>Username:</label><br>\n <input type='text'><br>\n <input type='submit'>\n</form>"
        }
    };

    function loadTopic(key) {
        const topic = topics[key];
        document.getElementById('title').innerText = topic.title;
        document.getElementById('desc').innerText = topic.desc;
        document.getElementById('code-input').value = topic.code;
        
        // UI: Remove active class and add to clicked
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        document.getElementById('link-' + key).classList.add('active');
        
        runCode();
    }

    function runCode() {
        const code = document.getElementById('code-input').value;
        const iframe = document.getElementById('result-frame');
        const frameDoc = iframe.contentDocument || iframe.contentWindow.document;
        frameDoc.open();
        frameDoc.write(code);
        frameDoc.close();
    }

    // Default Load
    loadTopic('home');
</script>

</body>
</html>
